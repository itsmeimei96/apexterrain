<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://cdn.tailwindcss.com"></script>
<style>

  .font-heading { font-family: 'Barlow Condensed', sans-serif; }

<body style="background:#1a1a1a; margin:0; padding:0;">
<section style="padding: 80px 48px; background: #1a1a1a;">
  <div style="max-width: 700px;">
    <p class="section-label" style="margin-bottom:16px;">Get In Touch</p>
    <h2 class="font-heading text-white" style="font-size: 3rem; margin-bottom: 24px;">Request Your<br /><span style="color: #f28c28;">Free Quote</span></h2>
    <p style="color: rgba(255,255,255,0.5); line-height: 1.8; font-weight: 300; max-width: 440px; font-family: 'Roboto', sans-serif;">We provide free on-site quotes for projects located between North Vancouver and Hope. For locations outside this range, please contact us for a custom assessment.</p>
